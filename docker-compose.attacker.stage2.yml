# Override compose cho stage 2: them attacker container chay
# stage2_flag_b.py va override POPS_FRAG_THRESHOLD de Rl2 trip ngay
# tren A query nho.
name: pops-ctf-stage2

services:
  attacker:
    build:
      context: .
      dockerfile: attacker/Dockerfile
    networks:
      ctf_net:
        ipv4_address: 10.0.2.50
    ports:
      - "8183:8080"

  pops:
    environment:
      POPS_FRAG_THRESHOLD: "50"
