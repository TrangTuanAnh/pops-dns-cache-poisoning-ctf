name: pops-ctf

# Master compose de nhin tong the. Khi lam tung stage, uu tien cac file
# docker-compose.stage*.yml vi chung co subnet rieng va it nhieu hon.

services:
  pops:
    build: ./pops
    profiles:
      - shared
      - stage1
      - stage2
      - stage3
    environment:
      POPS_STAGE: all
      POPS_MODE: dry-run
      POPS_TAU: ${POPS_TAU:-5}
      POPS_WINDOW: ${POPS_WINDOW:-1.0}
    volumes:
      - pops_logs:/var/log/pops
    networks:
      ctf_net:
        ipv4_address: 10.10.0.2

  nsd-authoritative:
    build: ./nsd-auth
    profiles:
      - shared
      - stage1
      - stage2
      - stage3
    networks:
      ctf_net:
        ipv4_address: 10.10.0.10

  registrar-service:
    build: ./registrar-service
    profiles:
      - shared
      - stage2
      - stage3
    environment:
      REGISTRAR_STATE_PATH: ${REGISTRAR_STATE_PATH:-/data/registrations.json}
    ports:
      - "8080:8080"
    volumes:
      - registrar_data:/data
    networks:
      ctf_net:
        ipv4_address: 10.10.0.30

  spoof-helper:
    build: ./spoof-helper
    profiles:
      - shared
      - stage1
      - stage2
      - stage3
    environment:
      SPOOF_HELPER_DRY_RUN: ${SPOOF_HELPER_DRY_RUN:-true}
    ports:
      - "8082:8080"
    networks:
      ctf_net:
        ipv4_address: 10.10.0.40

  stage1-dnsmasq:
    build: ./dnsmasq-2.82
    profiles:
      - stage1
    depends_on:
      - pops
      - nsd-authoritative
    networks:
      ctf_net:
        ipv4_address: 10.10.1.3

  stage2-resolver:
    build: ./vulnerable-resolver
    profiles:
      - stage2
    depends_on:
      - pops
      - nsd-authoritative
    networks:
      ctf_net:
        ipv4_address: 10.10.2.3

  stage3-technitium:
    build: ./technitium-vulnerable
    profiles:
      - stage3
    depends_on:
      - pops
      - nsd-authoritative
    networks:
      ctf_net:
        ipv4_address: 10.10.3.3

  flag-service:
    build: ./flag-service
    profiles:
      - shared
      - stage1
      - stage2
      - stage3
    environment:
      STAGE: all
      FLAG_1A: ${FLAG_1A:-flag{dev_stage1a_placeholder}}
      FLAG_1B: ${FLAG_1B:-flag{dev_stage1b_placeholder}}
      FLAG_2A: ${FLAG_2A:-flag{dev_stage2a_placeholder}}
      FLAG_2B: ${FLAG_2B:-flag{dev_stage2b_placeholder}}
      FLAG_3A: ${FLAG_3A:-flag{dev_stage3a_placeholder}}
      FLAG_3B: ${FLAG_3B:-flag{dev_stage3b_placeholder}}
    ports:
      - "8081:8080"
    networks:
      ctf_net:
        ipv4_address: 10.10.0.20

networks:
  ctf_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16

volumes:
  pops_logs:
  registrar_data:

