name: pops-ctf-stage3

# Stage 3: Rl3 (Out-of-Bailiwick) implementation pitfalls.
# Flag 3B la deterministic API probe: so sanh hai variant POPS
# (correct vs naive) qua /api/v1/lab/check-bailiwick voi 4 case
# normalization (case sensitivity, separator dot, trailing dot, IDN).
#
# Scope 3-flag: bo Technitium, registrar-service, spoof-helper.
# Flag 3B khong can resolver path - chi probe POPS API truc tiep.

services:
  pops:
    build: ./pops
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      POPS_STAGE: stage3
      POPS_TAU: ${POPS_TAU:-5}
      POPS_WINDOW: ${POPS_WINDOW:-1.0}
      POPS_UPSTREAM: 10.0.3.10:53
      POPS_BAILIWICK_ORIGIN: meridian-stage3.example
      POPS_NAIVE_BAILIWICK: "0"
      POPS_FRAG_THRESHOLD: "65535"
    volumes:
      - pops_logs:/var/log/pops
    networks:
      ctf_net:
        ipv4_address: 10.0.3.2

  pops-naive:
    build: ./pops
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      POPS_STAGE: stage3-naive
      POPS_UPSTREAM: 10.0.3.10:53
      POPS_BAILIWICK_ORIGIN: meridian-stage3.example
      POPS_NAIVE_BAILIWICK: "1"
      POPS_FRAG_THRESHOLD: "65535"
      POPS_API_PORT: "8080"
    volumes:
      - pops_logs:/var/log/pops
    networks:
      ctf_net:
        ipv4_address: 10.0.3.6

  nsd-authoritative:
    build: ./nsd-auth
    volumes:
      - shared_zones:/shared
    networks:
      ctf_net:
        ipv4_address: 10.0.3.10

  flag-service:
    build: ./flag-service
    environment:
      STAGE: stage3
      TARGET_DOMAIN: vault.meridian-stage3.example
      DEFAULT_IP: 1.2.3.8
      ATTACKER_LISTENER_PORT: "8080"
      FLAG_3B: "${FLAG_3B:-flag{dev_stage3b_placeholder}}"
    ports:
      - "8281:8080"
    networks:
      ctf_net:
        ipv4_address: 10.0.3.20

networks:
  ctf_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.3.0/24

volumes:
  pops_logs:
  shared_zones:
